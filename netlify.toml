# --- Garde les URL en .html (cohérence avec canonical + sitemap) ---
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = false

# --- Redirection www -> domaine principal ---
[[redirects]]
  from = "https://www.dupiedaletrier.fr/*"
  to = "https://dupiedaletrier.fr/:splat"
  status = 301
  force = true

# --- Page 404 ---
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# --- Sécurité ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# --- Cache : images et vidéo ---
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# --- Cache : CSS et JS ---
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# --- content.json : jamais en cache (modifié depuis Mon CMS) ---
[[headers]]
  for = "/content.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
